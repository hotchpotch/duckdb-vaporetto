name: Build and Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: duckdb-vaporetto-${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            platform: linux-x86_64
            duckdb_platform: linux_amd64
            duckdb_cli_asset: duckdb_cli-linux-amd64.zip
            extension_name: duckdb_vaporetto.duckdb_extension
            archive_ext: tar.gz
            shell: bash
          - os: ubuntu-24.04-arm
            platform: linux-aarch64
            duckdb_platform: linux_arm64
            duckdb_cli_asset: duckdb_cli-linux-arm64.zip
            extension_name: duckdb_vaporetto.duckdb_extension
            archive_ext: tar.gz
            shell: bash
          - os: macos-15
            platform: macos-aarch64
            duckdb_platform: osx_arm64
            duckdb_cli_asset: duckdb_cli-osx-arm64.zip
            extension_name: duckdb_vaporetto.duckdb_extension
            archive_ext: tar.gz
            shell: bash
          - os: windows-2022
            platform: windows-x86_64
            duckdb_platform: windows_amd64
            duckdb_cli_asset: duckdb_cli-windows-amd64.zip
            extension_name: duckdb_vaporetto.duckdb_extension
            archive_ext: zip
            shell: pwsh

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install stable Rust
        run: rustup default stable

      - name: Install cargo-duckdb-ext
        run: cargo install cargo-duckdb-ext-tools --version 0.5.0 --locked

      - name: Set package names
        id: package-names
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            version="$GITHUB_REF_NAME"
          else
            version="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n 1)"
          fi
          base_asset="duckdb-vaporetto-${version}-${{ matrix.platform }}"
          echo "without_model_asset=${base_asset}" >> "$GITHUB_OUTPUT"
          echo "with_model_asset=${base_asset}-with-model" >> "$GITHUB_OUTPUT"

      - name: Test Rust core
        run: cargo test

      - name: Fetch DuckDB CLI
        if: matrix.shell == 'bash'
        id: duckdb-unix
        shell: bash
        env:
          DUCKDB_CLI_ASSET: ${{ matrix.duckdb_cli_asset }}
        run: scripts/fetch-duckdb-unix.sh

      - name: Fetch DuckDB CLI for Windows
        if: matrix.shell == 'pwsh'
        id: duckdb-windows
        shell: pwsh
        run: |
          $root = ".tmp\duckdb"
          New-Item -ItemType Directory -Force -Path $root | Out-Null
          $archive = Join-Path $root "${{ matrix.duckdb_cli_asset }}"
          $url = "https://github.com/duckdb/duckdb/releases/download/v1.5.2/${{ matrix.duckdb_cli_asset }}"
          if (-not (Test-Path (Join-Path $root "duckdb.exe"))) {
            Invoke-WebRequest -Uri $url -OutFile $archive
            Expand-Archive -Path $archive -DestinationPath $root -Force
          }
          "duckdb_cli=$((Resolve-Path (Join-Path $root 'duckdb.exe')).Path)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Fetch Vaporetto model
        id: model
        shell: bash
        run: scripts/fetch-vaporetto-model.sh bccwj-suw+unidic_pos+kana

      - name: Build release extension without bundled model
        run: cargo duckdb-ext build -p ${{ matrix.duckdb_platform }} -a v1.2.0 -- --release

      - name: Test release extension without bundled model on Unix
        if: matrix.shell == 'bash'
        shell: bash
        env:
          DUCKDB_CLI: ${{ steps.duckdb-unix.outputs.duckdb_cli }}
          DUCKDB_VAPORETTO_MODEL: ${{ steps.model.outputs.model_path }}
          EXT: ${{ github.workspace }}/target/release/${{ matrix.extension_name }}
        run: tests/scalar.sh

      - name: Test release extension without bundled model on Windows
        if: matrix.shell == 'pwsh'
        shell: pwsh
        run: |
          .\tests\scalar.ps1 -DuckdbCli "${{ steps.duckdb-windows.outputs.duckdb_cli }}" -Extension "${{ github.workspace }}\target\release\${{ matrix.extension_name }}" -Model "${{ steps.model.outputs.model_path }}"

      - name: Package Unix release artifact without model
        if: matrix.shell == 'bash' && startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: scripts/package-release.sh "${{ steps.package-names.outputs.without_model_asset }}" "target/release/${{ matrix.extension_name }}" "${{ matrix.archive_ext }}" without-model

      - name: Package Windows release artifact without model
        if: matrix.shell == 'pwsh' && startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          $assetName = "${{ steps.package-names.outputs.without_model_asset }}"
          $packageDir = Join-Path "dist" $assetName
          New-Item -ItemType Directory -Force -Path (Join-Path $packageDir "tests") | Out-Null
          New-Item -ItemType Directory -Force -Path (Join-Path $packageDir "scripts") | Out-Null
          Copy-Item "target\release\${{ matrix.extension_name }}" $packageDir
          Copy-Item README.md,MODEL_LICENSES.md $packageDir
          Copy-Item docs $packageDir -Recurse
          Copy-Item tests\scalar.sql,tests\scalar.ps1 (Join-Path $packageDir "tests")
          Copy-Item scripts\fetch-vaporetto-model.ps1 (Join-Path $packageDir "scripts")
          $archive = Join-Path "dist" "$assetName.zip"
          Compress-Archive -Path $packageDir -DestinationPath $archive -Force
          $hash = (Get-FileHash -Algorithm SHA256 $archive).Hash.ToLowerInvariant()
          "$hash  $assetName.zip" | Set-Content -Path "$archive.sha256" -Encoding ascii

      - name: Fetch bundled Vaporetto model
        if: startsWith(github.ref, 'refs/tags/')
        id: bundled-model
        shell: bash
        run: scripts/fetch-vaporetto-model.sh bccwj-suw+unidic_pos+kana

      - name: Build release extension with bundled model
        if: startsWith(github.ref, 'refs/tags/')
        env:
          DUCKDB_VAPORETTO_EMBED_MODEL: ${{ steps.bundled-model.outputs.model_path }}
        run: cargo duckdb-ext build -p ${{ matrix.duckdb_platform }} -a v1.2.0 -- --release

      - name: Test release extension with bundled model on Unix
        if: matrix.shell == 'bash' && startsWith(github.ref, 'refs/tags/')
        shell: bash
        env:
          DUCKDB_CLI: ${{ steps.duckdb-unix.outputs.duckdb_cli }}
          EXT: ${{ github.workspace }}/target/release/${{ matrix.extension_name }}
        run: tests/default_model.sh

      - name: Test release extension with bundled model on Windows
        if: matrix.shell == 'pwsh' && startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          .\tests\default_model.ps1 -DuckdbCli "${{ steps.duckdb-windows.outputs.duckdb_cli }}" -Extension "${{ github.workspace }}\target\release\${{ matrix.extension_name }}"

      - name: Package Unix release artifact with model
        if: matrix.shell == 'bash' && startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: scripts/package-release.sh "${{ steps.package-names.outputs.with_model_asset }}" "target/release/${{ matrix.extension_name }}" "${{ matrix.archive_ext }}" with-model

      - name: Package Windows release artifact with model
        if: matrix.shell == 'pwsh' && startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          $assetName = "${{ steps.package-names.outputs.with_model_asset }}"
          $packageDir = Join-Path "dist" $assetName
          New-Item -ItemType Directory -Force -Path (Join-Path $packageDir "tests") | Out-Null
          New-Item -ItemType Directory -Force -Path (Join-Path $packageDir "scripts") | Out-Null
          Copy-Item "target\release\${{ matrix.extension_name }}" $packageDir
          Copy-Item README.md,MODEL_LICENSES.md $packageDir
          Copy-Item docs $packageDir -Recurse
          Copy-Item tests\scalar.sql,tests\scalar.ps1,tests\default_model.sql,tests\default_model.ps1 (Join-Path $packageDir "tests")
          Copy-Item scripts\fetch-vaporetto-model.ps1 (Join-Path $packageDir "scripts")
          $archive = Join-Path "dist" "$assetName.zip"
          Compress-Archive -Path $packageDir -DestinationPath $archive -Force
          $hash = (Get-FileHash -Algorithm SHA256 $archive).Hash.ToLowerInvariant()
          "$hash  $assetName.zip" | Set-Content -Path "$archive.sha256" -Encoding ascii

      - name: Upload packaged artifact
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v7
        with:
          name: duckdb-vaporetto-${{ matrix.platform }}
          path: |
            dist/${{ steps.package-names.outputs.without_model_asset }}.${{ matrix.archive_ext }}
            dist/${{ steps.package-names.outputs.without_model_asset }}.${{ matrix.archive_ext }}.sha256
            dist/${{ steps.package-names.outputs.with_model_asset }}.${{ matrix.archive_ext }}
            dist/${{ steps.package-names.outputs.with_model_asset }}.${{ matrix.archive_ext }}.sha256
          if-no-files-found: error

  build-wasm:
    name: duckdb-vaporetto-wasm_eh
    runs-on: ubuntu-24.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install nightly Rust for Emscripten
        run: |
          rustup toolchain install nightly --component rust-src --target wasm32-unknown-emscripten
          rustup target add wasm32-unknown-emscripten

      - name: Install cargo-duckdb-ext
        run: cargo install cargo-duckdb-ext-tools --version 0.5.0 --locked

      - name: Install Emscripten SDK
        shell: bash
        run: |
          git clone --depth 1 https://github.com/emscripten-core/emsdk.git .tmp/emsdk
          .tmp/emsdk/emsdk install 5.0.6
          .tmp/emsdk/emsdk activate 5.0.6

      - name: Fetch bundled Vaporetto model
        id: bundled-model
        shell: bash
        run: scripts/fetch-vaporetto-model.sh bccwj-suw_c0.003

      - name: Build wasm_eh extension with bundled model
        shell: bash
        run: scripts/build-wasm.sh "${{ steps.bundled-model.outputs.model_path }}"

      - name: Set package names
        id: package-names
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            version="$GITHUB_REF_NAME"
          else
            version="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n 1)"
          fi
          echo "with_model_asset=duckdb-vaporetto-${version}-wasm_eh-with-model" >> "$GITHUB_OUTPUT"

      - name: Package wasm release artifact with model
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: scripts/package-release.sh "${{ steps.package-names.outputs.with_model_asset }}" "target/wasm32-unknown-emscripten/release/duckdb_vaporetto.duckdb_extension.wasm" "tar.gz" with-model

      - name: Upload packaged wasm artifact
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v7
        with:
          name: duckdb-vaporetto-wasm_eh
          path: |
            dist/${{ steps.package-names.outputs.with_model_asset }}.tar.gz
            dist/${{ steps.package-names.outputs.with_model_asset }}.tar.gz.sha256
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - build
      - build-wasm
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Download release artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-assets

      - name: Generate release notes
        shell: bash
        run: scripts/release-notes.sh "$GITHUB_REF_NAME" > release-notes.md

      - name: Create or update GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mapfile -t assets < <(find release-assets -type f \( -name '*.tar.gz' -o -name '*.zip' -o -name '*.sha256' \) | sort)
          if [[ "${#assets[@]}" -eq 0 ]]; then
            echo "no release assets found" >&2
            exit 1
          fi

          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" "${assets[@]}" --clobber
          else
            gh release create "$GITHUB_REF_NAME" "${assets[@]}" --title "$GITHUB_REF_NAME" --notes-file release-notes.md
          fi
